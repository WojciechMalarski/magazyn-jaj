<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Magazyn Jaj</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    nav { background: #1f2937; color: white; padding: 12px 16px; display:flex; gap:12px; flex-wrap:wrap; }
    nav a { color: white; text-decoration: none; }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; padding: 16px; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    input, select, textarea, button { width: 100%; padding: 8px; margin-top: 4px; margin-bottom: 10px; box-sizing: border-box; }
    .row { display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px; }
    .small { color: #666; font-size: 14px; }
    .messages { list-style:none; padding:0; }
    .messages li { background:#e8f5e9; border:1px solid #a5d6a7; padding:10px; border-radius:8px; margin-bottom:8px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn { display:inline-block; background:#2563eb; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; }
    .muted { color:#6b7280; }
  </style>
</head>
<body>
{% if user.is_authenticated %}
<nav>
  <a href="{% url 'dashboard' %}">Dashboard</a>
  <a href="{% url 'stock_view' %}">Magazyn</a>
  <a href="{% url 'intake_list' %}">Przyjęcia</a>
  <a href="{% url 'sale_list' %}">Sprzedaż</a>
  <a href="{% url 'client_list' %}">Klienci</a>
  <a href="{% url 'breakage_list' %}">Stłuczki</a>
  <a href="{% url 'adjustment_list' %}">Korekty</a>
  <a href="{% url 'movement_list' %}">Ruchy</a>
  <form method="post" action="{% url 'logout' %}" style="margin-left:auto; width:auto;">{% csrf_token %}<button type="submit" style="width:auto; margin:0;">Wyloguj</button></form>
</nav>
{% endif %}
<div class="container">
  {% if messages %}
  <ul class="messages">{% for message in messages %}<li>{{ message }}</li>{% endfor %}</ul>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
